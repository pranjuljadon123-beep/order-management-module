<svg width="520" height="140" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg">
  <title>Daistrix logo</title>
  <desc>Daistrix monogram badge with navy square, D letterform, violet X overlay, and wordmark</desc>

  <g transform="translate(20, 20)">

    <!-- Badge -->
    <rect x="0" y="0" width="120" height="120" rx="18" fill="#1A1A2E"/>

    <!-- D — vertical stem -->
    <rect x="26" y="24" width="11" height="72" rx="2.5" fill="white"/>

    <!-- D — curved stroke -->
    <path d="M37,24 Q91,24 91,60 Q91,96 37,96" fill="none" stroke="white" stroke-width="11" stroke-linecap="round"/>

    <!-- X — left diagonal -->
    <line x1="66" y1="28" x2="102" y2="92" stroke="#6C63FF" stroke-width="8" stroke-linecap="round"/>

    <!-- X — right diagonal -->
    <line x1="102" y1="28" x2="66" y2="92" stroke="#A78BFA" stroke-width="8" stroke-linecap="round"/>

    <!-- Corner accent dot -->
    <circle cx="103" cy="22" r="6" fill="#6C63FF"/>

    <!-- Wordmark -->
    <text x="142" y="74" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="62px" fill="#1A1A2E" letter-spacing="-2">Daistrix</text>

  </g>
</svg>
